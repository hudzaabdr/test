<button id="startAR">Start AR</button>

<script type="module">
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js';
  
const loader = new GLTFLoader();  
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/webxr/ARButton.js';

let camera, scene, renderer;
let controller;
let reticle;

let hitTestSource = null;
let hitTestSourceRequested = false;

init();

function init() {

  // SCENE
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera();

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  document.body.appendChild(renderer.domElement);

  // AR BUTTON (hidden, trigger manual)
  const arButton = ARButton.createButton(renderer, {
    optionalFeatures: ['hit-test']
  });

  arButton.style.display = 'none';
  document.body.appendChild(arButton);

  document.getElementById("startAR").onclick = () => {
    arButton.click();
  };

  // LIGHT
  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  // RETICLE (penunjuk permukaan)
  const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
  const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
  reticle = new THREE.Mesh(geometry, material);

  reticle.rotation.x = -Math.PI / 2;
  reticle.visible = false;

  scene.add(reticle);

  // CONTROLLER (tap)
  controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  renderer.setAnimationLoop(render);
}

// SPAWN OBJECT (ini bikin stabil)
function onSelect() {
  if (reticle.visible) {

    const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
    const mesh = new THREE.Mesh(geometry, material);

    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);

    // 👉 TAMBAHKAN DI SINI
    mesh.rotation.set(0, 0, 0);

    scene.add(mesh);
  }
}
// RENDER LOOP + HIT TEST
function render(timestamp, frame) {

  if (frame) {

    const referenceSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();

    // REQUEST HIT TEST SOURCE
    if (!hitTestSourceRequested) {

      session.requestReferenceSpace('viewer').then(function (referenceSpace) {
        session.requestHitTestSource({ space: referenceSpace }).then(function (source) {
          hitTestSource = source;
        });
      });

      session.addEventListener('end', function () {
        hitTestSourceRequested = false;
        hitTestSource = null;
      });

      hitTestSourceRequested = true;
    }

    // HIT TEST RESULT
    if (hitTestSource) {

      const hitTestResults = frame.getHitTestResults(hitTestSource);

      if (hitTestResults.length) {

        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);

        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
        reticle.matrix.decompose(
          reticle.position,
          reticle.quaternion,
          reticle.scale
        );

      } else {
        reticle.visible = false;
      }
    }
  }

  renderer.render(scene, camera);
}
  
</script>
