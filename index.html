<button id="startAR">Start AR</button>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/webxr/ARButton.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js';
  
let camera, scene, renderer;
const loader = new GLTFLoader();
init();

function init() {

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera();

  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  document.body.appendChild(renderer.domElement);

  loader.load(
  'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  function (gltf) {

    const model = gltf.scene;

    model.scale.set(0.3, 0.3, 0.3);

    // posisi di depan kamera
    model.position.set(0, 0, -0.7);

    scene.add(model);
  },
  undefined,
  function (error) {
    console.error("GLB ERROR:", error);
  }
);

  const arButton = ARButton.createButton(renderer);
  arButton.style.display = "none";
  document.body.appendChild(arButton);

  document.getElementById("startAR").onclick = () => {
    arButton.click();
  };

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
}
</script>
