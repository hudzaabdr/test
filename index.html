<button id="startAR">Start AR</button>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/webxr/ARButton.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js'; // 🔥 AR-ADDED

const loader = new GLTFLoader(); // 🔥 AR-ADDED

let camera, scene, renderer;
let controller;
let reticle;

let hitTestSource = null;
let hitTestSourceRequested = false;

init();

function init() {

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera();

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  document.body.appendChild(renderer.domElement);

  const arButton = ARButton.createButton(renderer, {
    optionalFeatures: ['hit-test']
  });

  arButton.style.display = 'none';
  document.body.appendChild(arButton);

  document.getElementById("startAR").onclick = () => {
    arButton.click();
  };

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  const geometry = new THREE.RingGeometry(0.08, 0.1, 32);
  const material = new THREE.MeshBasicMaterial({ side: THREE.DoubleSide });
  reticle = new THREE.Mesh(geometry, material);

  reticle.rotation.x = -Math.PI / 2;
  reticle.visible = false;

  scene.add(reticle);

  controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  renderer.setAnimationLoop(render);
}

// 🔥 HANYA BAGIAN INI YANG DIUBAH
function onSelect() {
  if (reticle.visible) {

    loader.load(
      'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
      function (gltf) {

        const model = gltf.scene;

        model.scale.set(0.2, 0.2, 0.2);

        model.position.setFromMatrixPosition(reticle.matrix);
        model.quaternion.setFromRotationMatrix(reticle.matrix);

        scene.add(model);
      },
      undefined,
      function (error) {
        console.error("GLB load error:", error);
      }
    );

  }
}

function render(timestamp, frame) {

  if (frame) {

    const referenceSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();

    if (!hitTestSourceRequested) {

      session.requestReferenceSpace('viewer').then(function (referenceSpace) {
        session.requestHitTestSource({ space: referenceSpace }).then(function (source) {
          hitTestSource = source;
        });
      });

      session.addEventListener('end', function () {
        hitTestSourceRequested = false;
        hitTestSource = null;
      });

      hitTestSourceRequested = true;
    }

    if (hitTestSource) {

      const hitTestResults = frame.getHitTestResults(hitTestSource);

      if (hitTestResults.length) {

        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);

        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
        reticle.matrix.decompose(
          reticle.position,
          reticle.quaternion,
          reticle.scale
        );

      } else {
        reticle.visible = false;
      }
    }
  }

  renderer.render(scene, camera);
}
</script>
